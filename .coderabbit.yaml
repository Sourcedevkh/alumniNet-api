version: "1.0"
language: "en"

reviews:
  profile: "assertive"
  request_reviews_from_completions: true

instructions: >
  You are a Senior Fullstack Developer. Review this code for:
  1. **Node.js**: Check for error handling, Service/Controller separation, and Async/Await safety.
  2. **Shell Scripts**: Ensure variables are quoted (e.g., "$VAR") and use exit codes.
  3. **MySQL & Database**:
     - Check for **SQL Injection** risks (ensure parameterized queries).
     - Review `ALTER` and `CREATE` statements for best practices (Data types, Indexing).
     - Ensure table names and columns follow the project's naming convention.
     - Look for missing indexes on large tables (like 'users' in AlumniNet).
  4. **Clean Architecture**: Ensure code follows the proper folder structure and layers.